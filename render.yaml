services:
  - type: web
    name: criccoach-backend
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: GOOGLE_API_KEY
        sync: false   # You will set this in the Render dashboard — never hardcode!
